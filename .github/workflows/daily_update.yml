name: 주도섹터 노션 자동 업데이트

on:
  schedule:
    # 평일 오전 10시 (KST) = UTC 01:00
    - cron: "0 1 * * 1-5"
    # 평일 오후 3시 (KST) = UTC 06:00
    - cron: "0 6 * * 1-5"

  # 수동 실행도 가능하게
  workflow_dispatch:

jobs:
  update-notion:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 노션 업데이트 실행
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DAILY_DB_ID: ${{ secrets.NOTION_DAILY_DB_ID }}
          NOTION_WEEKLY_DB_ID: ${{ secrets.NOTION_WEEKLY_DB_ID }}
          NOTION_MONTHLY_DB_ID: ${{ secrets.NOTION_MONTHLY_DB_ID }}
        run: python sector_to_notion.py
