name: 주도섹터 노션 자동 업데이트

on:
  schedule:
    - cron: "0 1 * * 1-5"
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-notion:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: KRX 업종 섹터 업데이트
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DAILY_DB_ID: ${{ secrets.NOTION_DAILY_DB_ID }}
          NOTION_WEEKLY_DB_ID: ${{ secrets.NOTION_WEEKLY_DB_ID }}
          NOTION_MONTHLY_DB_ID: ${{ secrets.NOTION_MONTHLY_DB_ID }}
        run: python sector_to_notion.py

      - name: 네이버 테마 업데이트
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_THEME_DB_ID: ${{ secrets.NOTION_THEME_DB_ID }}
        run: python theme_to_notion.py
