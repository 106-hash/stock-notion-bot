<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테마 섹터 트래커</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --border: #1f2330;
    --text: #e8eaf0;
    --muted: #5a6070;
    --up: #ff4d6d;
    --up-soft: rgba(255,77,109,0.12);
    --down: #3a9fff;
    --down-soft: rgba(58,159,255,0.12);
    --gold: #ffc857;
    --green: #2ecc71;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }

  /* 헤더 */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-size: 18px;
    font-weight: 900;
    color: var(--up);
    letter-spacing: -0.5px;
  }

  .date-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    background: var(--border);
    padding: 4px 10px;
    border-radius: 6px;
  }

  .live-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .tab-bar {
    display: flex;
    gap: 4px;
    background: var(--border);
    padding: 4px;
    border-radius: 10px;
  }

  .tab {
    padding: 6px 16px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--up);
    color: white;
  }

  /* 메인 컨텐츠 */
  .main {
    padding: 20px 24px;
  }

  .section-title {
    font-size: 13px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* 테마 카드 그리드 */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: all 0.2s;
    animation: fadeIn 0.4s ease both;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--up), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover {
    border-color: rgba(255,77,109,0.3);
    transform: translateY(-2px);
  }

  .card:hover::before {
    opacity: 1;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .card-rank {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--border);
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 700;
  }

  .card-rank.top3 {
    background: rgba(255,200,87,0.15);
    color: var(--gold);
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-change {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--up);
  }

  .card-change.down {
    color: var(--down);
  }

  .card-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .card-trade {
    font-size: 12px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* 구성종목 태그 */
  .stocks-wrap {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .stock-tag {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 11px;
    font-weight: 600;
  }

  .stock-name {
    color: var(--text);
  }

  .stock-chg {
    font-family: 'JetBrains Mono', monospace;
    color: var(--up);
  }

  .stock-chg.down {
    color: var(--down);
  }

  /* 로딩 */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 0;
    color: var(--muted);
    gap: 16px;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--up);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* 노션 연동 안내 */
  .notion-tip {
    background: rgba(255,200,87,0.06);
    border: 1px solid rgba(255,200,87,0.2);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 13px;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* 빈 데이터 */
  .empty {
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
    font-size: 14px;
    line-height: 2;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">📈 테마 섹터 트래커</div>
    <div class="date-badge" id="dateLabel">—</div>
    <div class="live-dot"></div>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="setTab(this,'daily')">일간</button>
    <button class="tab" onclick="setTab(this,'weekly')">주간</button>
    <button class="tab" onclick="setTab(this,'monthly')">월간</button>
  </div>
</div>

<div class="main">
  <div class="notion-tip">
    💡 노션 DB와 연동되어 있습니다. 평일 오전 10시 / 오후 3시에 자동 업데이트됩니다.
  </div>

  <div class="section-title" id="sectionTitle">일간 테마 TOP 15</div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <div>노션에서 데이터를 불러오는 중...</div>
    </div>
  </div>
</div>

<script>
// ────────────────────────────────────────
// 노션 API 설정 (여기에 본인 값 입력)
// ────────────────────────────────────────
const NOTION_TOKEN  = "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";
const THEME_DB_ID   = "370b7af2d3c380808f48d4e74be353b8";
// ────────────────────────────────────────

let currentTag = "일간";

async function fetchThemes(tag) {
  const res = await fetch(`https://api.notion.com/v1/databases/${THEME_DB_ID}/query`, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${NOTION_TOKEN}`,
      "Notion-Version": "2022-06-28",
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      filter: { property: "구분", select: { equals: tag } },
      sorts: [{ property: "순위", direction: "ascending" }],
      page_size: 15,
    }),
  });
  const data = await res.json();
  return data.results || [];
}

function parseStock(text) {
  // "삼성전자(+3.2%), SK하이닉스(+1.1%)" 형태 파싱
  if (!text || text === "-") return [];
  return text.split(",").map(s => {
    const m = s.trim().match(/^(.+?)\(([+-]?\d+\.?\d*)%?\)$/);
    if (m) return { name: m[1].trim(), chg: parseFloat(m[2]) };
    return { name: s.trim(), chg: null };
  }).filter(s => s.name);
}

function renderCards(themes) {
  if (!themes.length) {
    return `<div class="empty">데이터가 없습니다.<br>평일 오전 10시 또는 오후 3시 이후에 확인해주세요.</div>`;
  }

  // 최신 날짜 라벨 표시
  const firstDate = themes[0]?.properties?.날짜?.rich_text?.[0]?.plain_text || "";
  document.getElementById("dateLabel").textContent = firstDate;

  return `<div class="grid">${themes.map((t, i) => {
    const p = t.properties;
    const name     = p.테마명?.title?.[0]?.plain_text || "-";
    const rank     = p.순위?.number || (i+1);
    const chg      = p["상승률(%)"]?.number ?? 0;
    const trade    = p.거래대금?.rich_text?.[0]?.plain_text || "-";
    const stockTxt = p.구성종목?.rich_text?.[0]?.plain_text || "-";
    const stocks   = parseStock(stockTxt);
    const isUp     = chg >= 0;

    const stockTags = stocks.map(s => `
      <span class="stock-tag">
        <span class="stock-name">${s.name}</span>
        ${s.chg !== null ? `<span class="stock-chg ${s.chg < 0 ? 'down' : ''}">${s.chg >= 0 ? '+' : ''}${s.chg}%</span>` : ''}
      </span>`).join("");

    return `
    <div class="card" style="animation-delay:${i*0.04}s">
      <div class="card-header">
        <div>
          <div class="card-name">${name}</div>
          <div class="card-trade">거래대금 ${trade}</div>
        </div>
        <div class="card-meta">
          <div class="card-change ${isUp ? '' : 'down'}">${isUp ? '+' : ''}${chg.toFixed(2)}%</div>
          <div class="card-rank ${rank <= 3 ? 'top3' : ''}">TOP${rank}</div>
        </div>
      </div>
      ${stocks.length ? `<div class="stocks-wrap">${stockTags}</div>` : ''}
    </div>`;
  }).join('')}</div>`;
}

async function load(tag) {
  document.getElementById("content").innerHTML = `
    <div class="loading"><div class="spinner"></div><div>불러오는 중...</div></div>`;
  try {
    const themes = await fetchThemes(tag);
    document.getElementById("content").innerHTML = renderCards(themes);
  } catch(e) {
    document.getElementById("content").innerHTML =
      `<div class="empty">오류가 발생했습니다.<br>${e.message}</div>`;
  }
}

function setTab(el, tag) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  currentTag = tag === "daily" ? "일간" : tag === "weekly" ? "주간" : "월간";
  document.getElementById("sectionTitle").textContent =
    `${currentTag} 테마 TOP 15`;
  load(currentTag);
}

// 날짜 초기화
const now = new Date();
document.getElementById("dateLabel").textContent =
  `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

load("일간");
</script>
</body>
</html>
