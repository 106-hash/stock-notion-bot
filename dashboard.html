<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테마 섹터 트래커</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans KR', sans-serif; background: #0d0f14; height: 100vh; display: flex; flex-direction: column; }

.header {
  background: #161920;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #1f2330;
  flex-shrink: 0;
}

.header-left { display: flex; align-items: center; gap: 12px; }
.logo { font-size: 16px; font-weight: 900; color: #ff4d6d; }
.date { font-size: 12px; color: #5a6070; background: #1f2330; padding: 3px 10px; border-radius: 6px; }

.tabs { display: flex; gap: 4px; }
.tab {
  padding: 6px 16px; border-radius: 20px; border: none;
  cursor: pointer; font-size: 13px; font-weight: 600;
  font-family: inherit; transition: all 0.2s;
  background: #1f2330; color: #5a6070;
}
.tab.active { background: #ff4d6d; color: #fff; }

.content { flex: 1; overflow: hidden; }

iframe {
  width: 100%; height: 100%;
  border: none;
  background: #fff;
}

.placeholder {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; color: #5a6070; gap: 12px;
}
.placeholder h2 { font-size: 18px; color: #8b8fa8; }
.placeholder p { font-size: 14px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">📈 테마 섹터 트래커</div>
    <div class="date" id="date"></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showView('daily')">일간 테마</button>
    <button class="tab" onclick="showView('notion')">노션 전체보기</button>
  </div>
</div>

<div class="content" id="content">
  <iframe
    src="https://southern-dresser-bdb.notion.site/370b7af2d3c380c8b038c1ddf8aab8ec"
    id="notionFrame"
    allowfullscreen>
  </iframe>
</div>

<script>
const now = new Date();
document.getElementById('date').textContent =
  `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

function showView(view) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['daily','notion'][i] === view);
  });
}
</script>
</body>
</html>
